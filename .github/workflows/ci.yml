name: terraform-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: Format, Validate & Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [vnet, aks, key-vault, app-service, storage-account, acr, log-analytics]
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init & validate
        working-directory: modules/${{ matrix.module }}
        run: |
          terraform init -backend=false
          terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6

      - name: Run tflint
        working-directory: modules/${{ matrix.module }}
        run: |
          tflint --init --config "${GITHUB_WORKSPACE}/.tflint.hcl"
          tflint --config "${GITHUB_WORKSPACE}/.tflint.hcl"

  checkov:
    name: Checkov (IaC misconfiguration scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          quiet: true
          soft_fail: false

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Run the pinned gitleaks binary directly: no wrapper action, no
      # deprecated Node runtime, and the exact scan command is visible here.
      - name: Run gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose
